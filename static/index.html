<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Capturador de Transcripciones de YouTube</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #0d0f14;
        --surface: #161820;
        --surface2: #1e2130;
        --border: #2a2d3e;
        --accent: #ff4444;
        --accent2: #ff6b35;
        --text: #e8eaf0;
        --muted: #7a7d8e;
        --success: #2ecc71;
        --error: #e74c3c;
        --radius: 12px;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: "Inter", sans-serif;
        background: var(--bg);
        color: var(--text);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
      }

      /* ── Header ── */
      header {
        width: 100%;
        padding: 24px 40px;
        display: flex;
        align-items: center;
        gap: 14px;
        border-bottom: 1px solid var(--border);
        background: var(--surface);
        backdrop-filter: blur(8px);
      }
      .logo-icon {
        width: 42px;
        height: 42px;
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
        box-shadow: 0 4px 16px rgba(255, 68, 68, 0.35);
      }
      header h1 {
        font-size: 1.25rem;
        font-weight: 600;
      }
      header p {
        font-size: 0.8rem;
        color: var(--muted);
        margin-top: 2px;
      }

      /* ── Main ── */
      main {
        width: 100%;
        max-width: 820px;
        padding: 48px 24px 80px;
        display: flex;
        flex-direction: column;
        gap: 32px;
      }

      /* ── Card ── */
      .card {
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 28px 32px;
      }

      .card-title {
        font-size: 0.9rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        color: var(--muted);
        margin-bottom: 20px;
      }

      /* ── Input row ── */
      .input-row {
        display: flex;
        gap: 12px;
      }

      input[type="text"] {
        flex: 1;
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 8px;
        color: var(--text);
        font-family: "Inter", sans-serif;
        font-size: 0.95rem;
        padding: 12px 16px;
        outline: none;
        transition: border-color 0.2s;
      }
      input[type="text"]:focus {
        border-color: var(--accent);
      }
      input[type="text"]::placeholder {
        color: var(--muted);
      }

      button {
        cursor: pointer;
        border: none;
        border-radius: 8px;
        font-family: "Inter", sans-serif;
        font-weight: 600;
        font-size: 0.9rem;
        padding: 12px 24px;
        transition:
          transform 0.15s,
          box-shadow 0.15s,
          opacity 0.15s;
      }
      button:active {
        transform: scale(0.97);
      }

      .btn-primary {
        background: linear-gradient(135deg, var(--accent), var(--accent2));
        color: #fff;
        box-shadow: 0 4px 14px rgba(255, 68, 68, 0.3);
      }
      .btn-primary:hover {
        box-shadow: 0 6px 20px rgba(255, 68, 68, 0.45);
      }
      .btn-primary:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }

      .btn-outline {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--text);
        font-size: 0.8rem;
        padding: 8px 16px;
      }
      .btn-outline:hover {
        border-color: var(--muted);
      }

      /* ── Status bar ── */
      #status {
        font-size: 0.85rem;
        padding: 10px 16px;
        border-radius: 8px;
        display: none;
      }
      #status.info {
        background: rgba(255, 255, 255, 0.05);
        color: var(--muted);
        display: block;
      }
      #status.success {
        background: rgba(46, 204, 113, 0.12);
        color: var(--success);
        display: block;
      }
      #status.error {
        background: rgba(231, 76, 60, 0.12);
        color: var(--error);
        display: block;
      }

      /* ── Loader ── */
      .loader {
        display: inline-block;
        width: 14px;
        height: 14px;
        border: 2px solid rgba(255, 255, 255, 0.2);
        border-top-color: #fff;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin-right: 8px;
        vertical-align: middle;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── Meta pills ── */
      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-bottom: 18px;
      }
      .pill {
        background: var(--surface2);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 4px 14px;
        font-size: 0.8rem;
        color: var(--muted);
      }
      .pill span {
        color: var(--text);
        font-weight: 500;
      }

      /* ── Transcript display ── */
      #transcript-container {
        display: none;
      }

      .segments-list {
        display: flex;
        flex-direction: column;
        gap: 2px;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 4px;
      }
      .segments-list::-webkit-scrollbar {
        width: 4px;
      }
      .segments-list::-webkit-scrollbar-track {
        background: var(--surface2);
      }
      .segments-list::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }

      .segment {
        display: grid;
        grid-template-columns: 70px 1fr;
        gap: 12px;
        padding: 8px 10px;
        border-radius: 6px;
        transition: background 0.15s;
      }
      .segment:hover {
        background: var(--surface2);
      }
      .segment-time {
        font-size: 0.75rem;
        color: var(--accent);
        font-variant-numeric: tabular-nums;
        padding-top: 1px;
      }
      .segment-text {
        font-size: 0.88rem;
        line-height: 1.5;
      }

      /* ── Saved list ── */
      .saved-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 10px 14px;
        border-radius: 8px;
        background: var(--surface2);
        margin-bottom: 8px;
        gap: 12px;
      }
      .saved-item-name {
        font-size: 0.85rem;
        font-weight: 500;
      }
      .saved-item-size {
        font-size: 0.75rem;
        color: var(--muted);
      }

      /* ── Tab switcher ── */
      .tabs {
        display: flex;
        gap: 4px;
        background: var(--surface2);
        border-radius: 8px;
        padding: 4px;
        margin-bottom: 18px;
      }
      .tab-btn {
        flex: 1;
        background: transparent;
        color: var(--muted);
        border-radius: 6px;
        padding: 8px 0;
        font-size: 0.83rem;
        transition:
          background 0.2s,
          color 0.2s;
      }
      .tab-btn.active {
        background: var(--surface);
        color: var(--text);
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      }

      .tab-panel {
        display: none;
      }
      .tab-panel.active {
        display: block;
      }

      /* ── Download link ── */
      .download-link {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        color: var(--accent);
        text-decoration: none;
        font-size: 0.82rem;
        font-weight: 500;
        padding: 6px 12px;
        border: 1px solid rgba(255, 68, 68, 0.3);
        border-radius: 6px;
        transition: background 0.15s;
      }
      .download-link:hover {
        background: rgba(255, 68, 68, 0.08);
      }

      footer {
        text-align: center;
        color: var(--muted);
        font-size: 0.75rem;
        padding: 24px;
      }
    </style>
  </head>
  <body>
    <header>
      <div class="logo-icon">▶</div>
      <div>
        <h1>Capturador de Transcripciones</h1>
        <p>
          Extrae y guarda en JSON la transcripción de cualquier video de YouTube
        </p>
      </div>
    </header>

    <main>
      <!-- Search card -->
      <div class="card">
        <p class="card-title">🔍 Buscar transcripción</p>
        <div class="input-row">
          <input
            type="text"
            id="video-input"
            placeholder="Código del video o URL completa — ej. rkZzg7Vowao"
            autocomplete="off"
          />
          <button
            class="btn-primary"
            id="fetch-btn"
            onclick="fetchTranscript()"
          >
            Capturar
          </button>
        </div>
        <div id="status" style="margin-top: 14px"></div>
      </div>

      <!-- Result card -->
      <div class="card" id="transcript-container">
        <p class="card-title">📄 Transcripción</p>

        <div class="meta-row" id="meta-row"></div>

        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('segments', this)">
            Segmentos
          </button>
          <button class="tab-btn" onclick="switchTab('fulltext', this)">
            Texto completo
          </button>
        </div>

        <div class="tab-panel active" id="tab-segments">
          <div class="segments-list" id="segments-list"></div>
        </div>

        <div class="tab-panel" id="tab-fulltext">
          <p
            id="full-text"
            style="
              font-size: 0.88rem;
              line-height: 1.7;
              color: var(--text);
              white-space: pre-wrap;
              max-height: 400px;
              overflow-y: auto;
              padding: 4px 8px;
            "
          ></p>
        </div>

        <div
          style="
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
          "
        >
          <a id="download-link" class="download-link" download
            >⬇ Descargar JSON</a
          >
          <button class="btn-outline" onclick="copyFullText()">
            📋 Copiar texto
          </button>
        </div>
      </div>

      <!-- Saved transcripts card -->
      <div class="card">
        <div
          style="
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
          "
        >
          <p class="card-title" style="margin: 0">💾 Archivos guardados</p>
          <button class="btn-outline" onclick="loadSaved()">
            ↻ Actualizar
          </button>
        </div>
        <div id="saved-list">
          <p style="color: var(--muted); font-size: 0.85rem">Cargando…</p>
        </div>
      </div>
    </main>

    <footer>
      Los archivos JSON se guardan en la carpeta <code>transcripts/</code> del
      servidor.
    </footer>

    <script>
      /* ── Utilities ── */
      function formatTime(seconds) {
        const m = Math.floor(seconds / 60)
          .toString()
          .padStart(2, "0");
        const s = Math.floor(seconds % 60)
          .toString()
          .padStart(2, "0");
        return `${m}:${s}`;
      }

      function setStatus(msg, type = "info") {
        const el = document.getElementById("status");
        el.textContent = msg;
        el.className = type;
      }

      function humanSize(bytes) {
        if (bytes < 1024) return bytes + " B";
        return (bytes / 1024).toFixed(1) + " KB";
      }

      /* ── Fetch transcript ── */
      async function fetchTranscript() {
        const input = document.getElementById("video-input").value.trim();
        if (!input) {
          setStatus("Por favor ingresá el código o URL del video.", "error");
          return;
        }

        const btn = document.getElementById("fetch-btn");
        btn.disabled = true;
        btn.innerHTML = '<span class="loader"></span>Capturando…';
        document.getElementById("transcript-container").style.display = "none";
        setStatus("Conectando con YouTube…", "info");

        try {
          const res = await fetch("/api/transcript", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ video_id: input }),
          });
          const data = await res.json();

          if (!res.ok || data.error) {
            setStatus("❌ " + (data.error || "Error desconocido"), "error");
            return;
          }

          setStatus(
            `✅ Transcripción guardada como "${data.saved_as}"  (${data.segments_count} segmentos, idioma: ${data.language})`,
            "success",
          );
          renderTranscript(data);
          loadSaved();
        } catch (e) {
          setStatus("❌ Error de red: " + e.message, "error");
        } finally {
          btn.disabled = false;
          btn.textContent = "Capturar";
        }
      }

      /* ── Render result ── */
      function renderTranscript(data) {
        const t = data.transcript;
        const container = document.getElementById("transcript-container");
        container.style.display = "block";

        // Meta pills
        document.getElementById("meta-row").innerHTML = `
      <div class="pill">ID: <span>${t.video_id}</span></div>
      <div class="pill">Idioma: <span>${t.language}</span></div>
      <div class="pill">Segmentos: <span>${t.segments.length}</span></div>
    `;

        // Segments
        const list = document.getElementById("segments-list");
        list.innerHTML = t.segments
          .map(
            (s) => `
      <div class="segment">
        <span class="segment-time">${formatTime(s.start)}</span>
        <span class="segment-text">${escapeHtml(s.text)}</span>
      </div>`,
          )
          .join("");

        // Full text
        document.getElementById("full-text").textContent = t.full_text;

        // Download button – generate Blob URL from the received JSON
        const blob = new Blob([JSON.stringify(t, null, 2)], {
          type: "application/json",
        });
        const url = URL.createObjectURL(blob);
        const link = document.getElementById("download-link");
        link.href = url;
        link.download = `${t.video_id}.json`;

        // Reset to first tab
        switchTab("segments", document.querySelector(".tab-btn"));
      }

      function escapeHtml(str) {
        return str
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      /* ── Tab switching ── */
      function switchTab(name, btn) {
        document
          .querySelectorAll(".tab-panel")
          .forEach((p) => p.classList.remove("active"));
        document
          .querySelectorAll(".tab-btn")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("tab-" + name).classList.add("active");
        btn.classList.add("active");
      }

      /* ── Copy full text ── */
      function copyFullText() {
        const text = document.getElementById("full-text").textContent;
        navigator.clipboard.writeText(text).then(() => {
          setStatus("✅ Texto copiado al portapapeles", "success");
        });
      }

      /* ── Saved transcripts list ── */
      async function loadSaved() {
        const container = document.getElementById("saved-list");
        try {
          const res = await fetch("/api/saved");
          const list = await res.json();
          if (!list.length) {
            container.innerHTML =
              '<p style="color:var(--muted);font-size:.85rem;">Aún no hay transcripciones guardadas.</p>';
            return;
          }
          container.innerHTML = list
            .map(
              (f) => `
        <div class="saved-item">
          <div>
            <div class="saved-item-name">📄 ${f.filename}</div>
            <div class="saved-item-size">${humanSize(f.size_bytes)}</div>
          </div>
          <button class="btn-outline" onclick="loadVideoById('${f.video_id}')">Cargar</button>
        </div>`,
            )
            .join("");
        } catch (e) {
          container.innerHTML =
            '<p style="color:var(--error);font-size:.85rem;">Error al cargar la lista.</p>';
        }
      }

      function loadVideoById(videoId) {
        document.getElementById("video-input").value = videoId;
        fetchTranscript();
      }

      /* ── Enter key ── */
      document
        .getElementById("video-input")
        .addEventListener("keydown", (e) => {
          if (e.key === "Enter") fetchTranscript();
        });

      /* ── Init ── */
      loadSaved();
    </script>
  </body>
</html>
